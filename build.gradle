plugins {
    id 'java'
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.0.13'
    id 'org.beryx.jlink' version '3.0.1'
}

java {
    toolchain {
        languageVersion.set(JavaLanguageVersion.of(21))
    }
}

group = 'org.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

javafx {
    version = "17.0.12"
    modules = ['javafx.base', 'javafx.controls', 'javafx.fxml', 'javafx.graphics', 'javafx.media']
}

application {
    getMainClass().set('agh.darwinworld.App')
    getMainModule().set('DarwinWorld')
}

tasks.withType(JavaExec).configureEach {
    jvmArgs += [
            '--add-opens', 'javafx.graphics/javafx.stage=ALL-UNNAMED',
            '--add-opens', 'javafx.graphics/com.sun.javafx.tk=ALL-UNNAMED',
            '--add-opens', 'javafx.graphics/com.sun.javafx.tk.quantum=ALL-UNNAMED'
    ]
    doFirst {
        if (!jvmArgs.any { it.toString().startsWith('--module-path') }) {
            def jfxJars = configurations.runtimeClasspath
                    .filter { it.name.startsWith('javafx') && it.name.endsWith('.jar') }
                    .asPath
            if (jfxJars) {
                jvmArgs '--module-path', jfxJars
                jvmArgs '--add-modules', 'javafx.base,javafx.controls,javafx.fxml,javafx.graphics,javafx.media'
            }
        }
    }
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    implementation 'net.java.dev.jna:jna:5.13.0'
    implementation 'net.java.dev.jna:jna-platform:5.13.0'
    implementation 'org.json:json:20250107'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

test {
    useJUnitPlatform()
}

jlink {
    options = ['--strip-debug', '--compress', '2', '--no-header-files', '--no-man-pages']

    targetPlatform("windows-x64") {
        jdkHome = jdkDownload("https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.2%2B13/OpenJDK21U-jdk_x64_windows_hotspot_21.0.2_13.zip")
    }
    targetPlatform("mac-x64") {
        jdkHome = jdkDownload("https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.2%2B13/OpenJDK21U-jdk_x64_mac_hotspot_21.0.2_13.tar.gz")
    }
    targetPlatform("linux-x64") {
        jdkHome = jdkDownload("https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.2%2B13/OpenJDK21U-jdk_x64_linux_hotspot_21.0.2_13.tar.gz")
    }

    launcher {
        name = 'DarwinWorld'
    }
}
